<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>CarePlus AI Receptionist</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

<div class="app-wrapper">

  <!-- Header -->
  <header class="chat-header">
    <div class="header-left">
      <div class="avatar">
        <span class="avatar-icon">🏥</span>
        <span class="status-dot"></span>
      </div>
      <div class="header-info">
        <h1 class="clinic-name">CarePlus AI Receptionist</h1>
        <p class="status-text"><span class="online-dot">●</span> Online — replies instantly</p>
      </div>
    </div>
    <div class="header-right">
      <button class="icon-btn" onclick="resetChat()" title="New conversation">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"></polyline>
          <path d="M3.51 15a9 9 0 1 0 .49-3.51"></path>
        </svg>
      </button>
    </div>
  </header>

  <!-- Chat window -->
  <main class="chat-window" id="chatWindow">

    <div class="date-chip" id="dateChip"></div>

    <!-- Welcome message -->
    <div class="message bot-message">
      <div class="bubble">
        <p>👋 Welcome to <strong>CarePlus Multispeciality Clinic</strong>, Mysore!</p>
        <p>I'm Aria, your AI receptionist. I can help you with doctor information, clinic timings, consultation fees, location, and booking appointments.</p>
        <p>How may I assist you today?</p>
        <span class="msg-time" id="welcomeTime"></span>
      </div>
    </div>

  </main>

  <!-- Quick Actions -->
  <div class="quick-actions" id="quickActions">
    <button class="quick-btn" onclick="sendQuick('I want to book an appointment')">📅 Book Appointment</button>
    <button class="quick-btn" onclick="sendQuick('Tell me about your doctors')">👨‍⚕️ Doctors</button>
    <button class="quick-btn" onclick="sendQuick('What are the consultation fees?')">💰 Fees</button>
    <button class="quick-btn" onclick="sendQuick('Where is the clinic located?')">📍 Location</button>
    <button class="quick-btn" onclick="sendQuick('What are your clinic timings?')">🕒 Timings</button>
  </div>

  <!-- Input Area -->
  <footer class="chat-footer">
    <div class="input-wrap">
      <textarea
        id="userInput"
        class="msg-input"
        placeholder="Type a message…"
        rows="1"
        maxlength="500"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </footer>

</div>

<script src="/static/script.js"></script>
</body>
</html>
